<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Adapt · Sales & Influencer Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080e;--surface:#0f0f18;--card:#14141f;--border:#252535;
  --text:#e4e4f0;--muted:#55556a;--muted2:#88889a;
  --food:#f7a84a;--fully:#4af7a0;--epais:#f76ac8;
  --shopify:#96bf48;--amazon:#f59e0b;--tiktok:#69c9d0;
  --views:#7c9cff;
  --b2b:#a78bfa;
}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}

/* ── HEADER ── */
.header{padding:22px 40px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
  position:sticky;top:0;background:rgba(8,8,14,.97);backdrop-filter:blur(14px);z-index:200;}
.header h1{font-size:16px;font-weight:700;letter-spacing:.06em}
.header-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.08em;margin-top:2px}
.blink{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;animation:blink 1.8s infinite;}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 12px currentColor}50%{opacity:.3;box-shadow:none}}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.sync-status{font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,.4);}
.hbtn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);color:rgba(255,255,255,.65);
  border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:'DM Mono',monospace;outline:none;transition:background .15s;}
.hbtn:hover{background:rgba(255,255,255,.13);}
.hbtn:disabled{opacity:.35;cursor:not-allowed;}

/* ── BRAND TABS ── */
.brand-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 40px;background:var(--surface);}
.btab{padding:13px 22px;font-size:13px;font-weight:700;letter-spacing:.06em;cursor:pointer;
  border-bottom:2px solid transparent;color:var(--muted);transition:all .2s;white-space:nowrap;}
.btab:hover{color:var(--text);}
.btab.active{color:var(--text);border-bottom-color:currentColor;}

/* ── PANEL ── */
.brand-panel{display:none;padding:26px 40px;gap:22px;flex-direction:column;}
.brand-panel.visible{display:flex;}

/* ── DATE BAR ── */
.date-filter-bar{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:13px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.dfl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;}
.preset-btns{display:flex;gap:4px;}
.preset-btn{font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;border-radius:6px;
  border:1px solid var(--border);background:transparent;color:var(--muted2);cursor:pointer;transition:all .15s;}
.preset-btn:hover{border-color:var(--muted2);color:var(--text);}
.preset-btn.active{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.28);color:var(--text);font-weight:500;}
.date-inputs{display:flex;align-items:center;gap:7px;margin-left:auto;}
.date-input{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;
  color:var(--text);font-family:'DM Mono',monospace;font-size:10px;padding:4px 9px;
  outline:none;cursor:pointer;color-scheme:dark;min-width:106px;}
.date-sep{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
.date-divider{width:1px;height:18px;background:var(--border);}
.chtab{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;padding:5px 13px;border-radius:8px;
  border:1px solid var(--border);background:transparent;color:var(--muted2);cursor:pointer;transition:all .18s;}
.chtab:hover{border-color:var(--muted2);color:var(--text);}
.chtab.on-shopify{background:rgba(150,191,72,.12);border-color:rgba(150,191,72,.4);color:var(--shopify);}
.chtab.on-amazon{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.4);color:var(--amazon);}
.chtab.on-tiktok{background:rgba(105,201,208,.12);border-color:rgba(105,201,208,.4);color:var(--tiktok);}
.chtab.on-b2b{background:rgba(167,139,250,.12);border-color:rgba(167,139,250,.4);color:#a78bfa;}

/* ── KPI (매출만) ── */
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;
  position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--c,var(--border));}
.kpi-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
.kpi-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;}
.kpi-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);margin-top:3px;}

/* ── CHART CARD ── */
.section-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted2);margin-bottom:11px;}
.collapsible-header:hover .collapse-arrow{color:var(--text)!important;}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 22px;}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.chart-title-label{font-size:12px;font-weight:700;letter-spacing:.04em;}
.chart-wrap{height:290px;position:relative;}

/* ── INF SECTION ── */
.inf-section-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.inf-count-badge{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);
  background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:5px;padding:2px 8px;}
.inf-bulk-btns{display:flex;gap:6px;}
.ibtn{font-family:'DM Mono',monospace;font-size:10px;padding:5px 13px;border-radius:7px;
  border:1px solid var(--border);background:transparent;color:var(--muted2);cursor:pointer;transition:all .15s;}
.ibtn:hover{background:rgba(255,255,255,.06);color:var(--text);}
.ibtn.sel{border-color:rgba(74,247,160,.35);color:#4af7a0;background:rgba(74,247,160,.07);}
.ibtn.desel{border-color:rgba(255,100,100,.3);color:#ff7070;background:rgba(255,100,100,.05);}

/* ── INF GRID ── */
.inf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;}

/* ── INF CARD ── */
.inf-card{background:var(--card);border:1px solid var(--border);border-radius:13px;overflow:hidden;
  transition:transform .18s,border-color .18s,box-shadow .18s,opacity .18s;cursor:pointer;user-select:none;}
.inf-card:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(0,0,0,.4);}
.inf-card.inactive{opacity:.3;filter:grayscale(.6);}
.inf-card.inactive:hover{opacity:.5;}

.inf-card-header{padding:11px 13px 8px;display:flex;align-items:center;justify-content:space-between;}
.inf-name-row{display:flex;align-items:center;gap:7px;}
.rank-badge{width:20px;height:20px;border-radius:6px;font-family:'DM Mono',monospace;font-size:10px;
  display:flex;align-items:center;justify-content:center;background:var(--border);color:var(--muted);flex-shrink:0;}
.rank-badge.gold{background:rgba(247,168,74,.2);color:#f7a84a;}
.rank-badge.silver{background:rgba(200,200,220,.15);color:#bbb;}
.rank-badge.bronze{background:rgba(180,120,80,.2);color:#c8843a;}
.inf-username{font-size:12px;font-weight:700;letter-spacing:.03em;cursor:pointer;transition:color .15s;}
.inf-username:hover{color:var(--views);}
.inf-username:active{opacity:.7;}
.monthly-cost-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;
  padding:8px 14px;background:rgba(255,255,255,.03);border-radius:8px;border:1px solid var(--border);}
.monthly-cost-item{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);white-space:nowrap;}
.monthly-cost-item span{color:var(--text);font-weight:500;}
.monthly-cost-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);
  letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;}
.copy-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#14141f;border:1px solid rgba(124,156,255,.3);color:var(--views);
  font-family:'DM Mono',monospace;font-size:11px;padding:8px 16px;border-radius:8px;
  pointer-events:none;z-index:9999;opacity:0;transition:opacity .2s;}
.copy-toast.show{opacity:1;}
.inf-total-views{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--views);}
.on-pill{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:10px;
  background:rgba(74,247,160,.15);color:#4af7a0;border:1px solid rgba(74,247,160,.25);}
.off-pill{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:10px;
  background:rgba(255,255,255,.06);color:var(--muted2);border:1px solid transparent;}

/* tier + meta */
.inf-meta-row{display:flex;align-items:center;gap:6px;padding:2px 13px 7px;flex-wrap:wrap;}
.tier-badge{font-family:'DM Mono',monospace;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.05em;text-transform:uppercase;}
.tier-nano{background:rgba(160,160,160,.18);color:#aaa;}
.tier-micro{background:rgba(100,160,255,.18);color:#7ec8ff;}
.tier-middle{background:rgba(100,230,150,.18);color:#5fd99b;}
.tier-macro{background:rgba(255,170,60,.18);color:#ffb84d;}
.tier-mega{background:rgba(210,100,255,.18);color:#d46ef5;}
.meta-kv{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);white-space:nowrap;}
.meta-kv span{color:var(--text);font-weight:500;}
.meta-sep{width:1px;height:9px;background:var(--border);}

/* stats strip */
.inf-stats{display:flex;gap:0;padding:6px 13px 5px;border-top:1px solid rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.04);}
.stat-item{flex:1;display:flex;flex-direction:column;gap:1px;}
.stat-val{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;}
.stat-lbl{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.stat-sep{width:1px;background:var(--border);margin:0 8px;}

/* chart inside card */
.inf-chart-wrap{padding:4px 11px 8px;height:90px;}

/* footer: dates + links */
.inf-footer{padding:7px 13px 10px;display:flex;flex-direction:column;gap:5px;}
.inf-dates{display:flex;gap:10px;flex-wrap:wrap;}
.inf-date-item{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);}
.inf-date-item span{color:var(--muted2);}
.inf-links{display:flex;gap:6px;flex-wrap:wrap;}
.link-btn{font-family:'DM Mono',monospace;font-size:9px;padding:3px 8px;border-radius:5px;
  text-decoration:none;border:1px solid var(--border);color:var(--muted2);background:rgba(255,255,255,.03);
  transition:all .15s;display:inline-flex;align-items:center;gap:4px;}
.link-btn:hover{border-color:rgba(255,255,255,.25);color:var(--text);background:rgba(255,255,255,.07);}
.link-tt{border-color:rgba(105,201,208,.25);color:var(--tiktok);}
.link-tt:hover{background:rgba(105,201,208,.1);}
.link-ig{border-color:rgba(247,106,200,.25);color:var(--epais);}
.link-ig:hover{background:rgba(247,106,200,.1);}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:999;gap:14px;transition:opacity .5s;}
#loading.hidden{opacity:0;pointer-events:none;}
#loading p{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
.spinner{width:30px;height:30px;border:2px solid var(--border);border-top-color:#6366f1;
  border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p id="loading-msg">데이터 불러오는 중...</p></div>
<div class="copy-toast" id="copy-toast">@핸들 복사됨</div>

<div class="header">
  <div>
    <h1>📊 Adapt · 브랜드 매출 & 인플루언서 대시보드</h1>
    <div class="header-sub" id="data-range-sub">로딩 중...</div>
  </div>
  <div class="header-right">
    <span class="sync-status" id="sync-status">연결 중...</span>
    <select class="hbtn" id="schedule-sel" onchange="onScheduleChange(this)">
      <option value="0">수동만</option>
      <option value="1800000">30분마다</option>
      <option value="3600000">1시간마다</option>
      <option value="daily_1pm">매일 오후 1시</option>
    </select>
    <button class="hbtn" id="sync-btn" onclick="doSync()">↻ 지금 동기화</button>
  </div>
</div>

<div class="brand-tabs">
  <div class="btab active" style="color:var(--food)"  onclick="switchBrand('foodology',this)"><span class="blink" style="color:var(--food);background:var(--food)"></span>FOODOLOGY</div>
  <div class="btab"        onclick="switchBrand('fully',this)"><span class="blink" style="color:var(--fully);background:var(--fully)"></span>FULLY</div>
  <div class="btab"        onclick="switchBrand('epais',this)"><span class="blink" style="color:var(--epais);background:var(--epais)"></span>EPAIS</div>
</div>

<div id="panel_foodology" class="brand-panel visible"></div>
<div id="panel_fully"     class="brand-panel"></div>
<div id="panel_epais"     class="brand-panel"></div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────
const SALES_KEY = 'AIzaSyDW8hT7HBfHCOPJGTkH9-oE8aO0VxATVyo';
const SALES_ID  = '1XyX56cddvb6K7QjvRKeP9FlADsoFIPUJWpUixVR0zRg';
const SALES_RNG = "'미국'!A:Q";  // Q열까지 (ep_rev_tt=16)
const INF_KEY   = 'AIzaSyDW8hT7HBfHCOPJGTkH9-oE8aO0VxATVyo';
const INF_ID    = '1x3v4_PZrFzV2L18YS7z_yMFj_7APOC5_G_jQrkN-DuY';
const SEED_RNG  = 'inf_seeding!A:R';
const TRACK_RNG = 'view_tracking!A:M';

// 매출 컬럼
const SC = { date:0,
  // Foodology: C(2)b2b D(3)소계 E(4)shopify F(5)amz G(6)tt
  food_b2b:2, food_shopify:4, food_amazon:5, food_tiktok:6,
  // FULLY: H(7)b2b I(8)olive J(9)소계 K(10)shopify L(11)amz M(12)tt
  fully_b2b:7, fully_olive:8, fully_shopify:10, fully_amazon:11, fully_tiktok:12,
  // Epais: N(13)b2b O(14)소계 P(15)amz Q(16)tt
  epais_b2b:13, epais_total:14, epais_amazon:15, epais_tiktok:16
};

// track 컬럼: brand(0) username(2) day(4) views(5) views_delta(6) likes(7) shares(9)
const TC = { brand:0, product:1, username:2, id:3, day:4, views:5, delta:6, likes:7, shares:9 };

// seed 컬럼: brand(0) product(1) inf(2) account(3) cost(4) follower(6) tier(8) TT_upload(9) IG_upload(10) upload_date(16)
const EC = { brand:0, product:1, inf:2, account:3, cost:4, follower:6, tier:8, tt_url:9, ig_url:10, ig_view:13, upload_date:17 };

const BNORM = { 'Foodology':'foodology','FULLY':'fully','Fully':'fully','Epais':'epais',
                'foodology':'foodology','fully':'fully','epais':'epais' };
const BCOLORS = { foodology:'#f7a84a', fully:'#4af7a0', epais:'#f76ac8' };
const BLABELS = { foodology:'Foodology', fully:'FULLY', epais:'Epais' };
const CHLBLS  = { shopify:'Shopify', amazon:'Amazon', tiktok:'TikTok Shop' };
const CHCOLORS= { shopify:'#96bf48', amazon:'#f59e0b', tiktok:'#69c9d0' };

// ─── STATE ───────────────────────────────────────────────────
let SALES_RAW = [];   // [{day, foodology:{s,a,t}, fully:{...}, epais:{...}}]
let VIEWS_BY_DAY = {};// {brand: {day: {total, byInf:{user:delta}}}}
let VIEWS_BY_INF = {};// {brand: {user: {totalViews, totalLikes, totalShares, byDay:{day:delta}, peakDay, peakVal}}}
let SEED_META    = {};// {brand: {user: {tier, follower, cost, tt_url, ig_url, upload_date, account}}}
let SEED_ROWS    = [];// raw rows: [{brand, cost, upload_date}] — 월별 집계용

let current   = 'foodology';
let dateRange = { foodology:{from:'',to:''}, fully:{from:'',to:''}, epais:{from:'',to:''} };
let activeInf = { foodology:new Set(), fully:new Set(), epais:new Set() };
let activeCh  = { foodology:new Set(['shopify','amazon','tiktok','b2b']), fully:new Set(['shopify','amazon','tiktok','b2b','olive']), epais:new Set(['amazon','tiktok','b2b']) };
let charts    = {};
let inited    = false;
let _sTimer=null, _dTimer=null;

// ─── UTILS ───────────────────────────────────────────────────
const num  = v => parseInt((v||'0').replace(/,/g,''),10)||0;
function parseDate(v){
  const m=String(v||'').match(/(\d{4})[-.][\s]*(\d{1,2})[-.][\s]*(\d{1,2})/);
  return m?`${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`:null;
}
function fmtKRW(v){
  if(v>=1e12)return(v/1e12).toFixed(1)+'조';
  if(v>=1e8) return(v/1e8).toFixed(1)+'억';
  if(v>=1e4) return(v/1e4).toFixed(1)+'만';
  return v.toLocaleString('ko-KR');
}
function fmtView(v){
  if(v>=1e6) return(v/1e6).toFixed(1)+'M';
  if(v>=1e3) return(v/1e3).toFixed(1)+'K';
  return v.toString();
}
function hex2rgba(h,a){
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function getFiltered(b){
  const {from,to}=dateRange[b];
  return SALES_RAW.filter(r=>(!from||r.day>=from)&&(!to||r.day<=to));
}

// ─── FETCH ───────────────────────────────────────────────────
async function doSync(){
  const st=document.getElementById('sync-status'), btn=document.getElementById('sync-btn');
  st.textContent='동기화 중...'; st.style.color='#f59e0b';
  if(btn) btn.disabled=true;
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('loading-msg').textContent='매출 · 시딩 · 조회수 데이터 불러오는 중...';

  try{
    const [sR, seedR, trackR] = await Promise.all([
      fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SALES_ID}/values/${encodeURIComponent(SALES_RNG)}?key=${SALES_KEY}`).then(r=>r.json()),
      fetch(`https://sheets.googleapis.com/v4/spreadsheets/${INF_ID}/values/${encodeURIComponent(SEED_RNG)}?key=${INF_KEY}`).then(r=>r.json()),
      fetch(`https://sheets.googleapis.com/v4/spreadsheets/${INF_ID}/values/${encodeURIComponent(TRACK_RNG)}?key=${INF_KEY}`).then(r=>r.json()),
    ]);
    if(sR.error)     throw new Error('매출: '+sR.error.message);
    if(seedR.error)  throw new Error('시딩: '+seedR.error.message);
    if(trackR.error) throw new Error('조회수: '+trackR.error.message);

    // ── 매출 파싱 ──
    SALES_RAW=[];
    for(const row of sR.values.slice(1)){
      const day=parseDate(row[SC.date]); if(!day) continue;
      SALES_RAW.push({day,
        foodology:{
          b2b:num(row[SC.food_b2b]), shopify:num(row[SC.food_shopify]),
          amazon:num(row[SC.food_amazon]), tiktok:num(row[SC.food_tiktok]), olive:0,
        },
        fully:{
          b2b:num(row[SC.fully_b2b]), olive:num(row[SC.fully_olive]),
          shopify:num(row[SC.fully_shopify]), amazon:num(row[SC.fully_amazon]), tiktok:num(row[SC.fully_tiktok]),
        },
        epais:{
          b2b:num(row[SC.epais_b2b]), shopify:0,
          amazon:num(row[SC.epais_amazon]), tiktok:num(row[SC.epais_tiktok]), olive:0,
        },
      });
    }
    SALES_RAW.sort((a,b)=>a.day.localeCompare(b.day));

    // ── 시딩 메타 파싱 ──
    SEED_META={ foodology:{}, fully:{}, epais:{} };
    SEED_ROWS=[];
    for(const row of seedR.values.slice(1)){
      const bKey=BNORM[row[EC.brand]]; if(!bKey) continue;
      const user=(row[EC.inf]||'').replace(/^@/,'').trim().toLowerCase();
      const rowCost = num(row[EC.cost]);
      // 행별 raw 저장 (월별 비용 집계용 — 인플루언서 무관)
      const uploadDateVal = (row[EC.upload_date]||'').toString().trim();
      if(rowCost > 0 && uploadDateVal){
        SEED_ROWS.push({ brand: bKey, cost: rowCost, upload_date: uploadDateVal });
      }
      if(SEED_META[bKey][user]){
        // 같은 인플루언서 중복 → 비용 누적, 나머지는 첫 행 우선
        SEED_META[bKey][user].cost += rowCost;
        // 링크/날짜 빈 값이면 채워줌
        if(!SEED_META[bKey][user].tt_url  && row[EC.tt_url])  SEED_META[bKey][user].tt_url  = row[EC.tt_url];
        if(!SEED_META[bKey][user].ig_url  && row[EC.ig_url])  SEED_META[bKey][user].ig_url  = row[EC.ig_url];
        if(!SEED_META[bKey][user].upload_date && row[EC.upload_date]) SEED_META[bKey][user].upload_date = row[EC.upload_date];
      } else {
        SEED_META[bKey][user]={
          tier:       row[EC.tier]||'',
          follower:   row[EC.follower]||'',
          cost:       rowCost,
          tt_url:     row[EC.tt_url]||'',
          ig_url:     row[EC.ig_url]||'',
          upload_date:row[EC.upload_date]||'',
          account:    row[EC.account]||'',
        };
      }
    }

    // ── 조회수 파싱 ──
    VIEWS_BY_DAY={ foodology:{}, fully:{}, epais:{} };
    VIEWS_BY_INF={ foodology:{}, fully:{}, epais:{} };

    for(const row of trackR.values.slice(1)){
      const bKey=BNORM[row[TC.brand]]; if(!bKey) continue;
      const day  =row[TC.day];         if(!day)  continue;
      const user =(row[TC.username]||'unknown').trim().toLowerCase();
      const delta=num(row[TC.delta]);
      const views=num(row[TC.views]);
      const likes=num(row[TC.likes]);
      const shares=num(row[TC.shares]);

      // by day
      if(!VIEWS_BY_DAY[bKey][day]) VIEWS_BY_DAY[bKey][day]={total:0, byInf:{}};
      VIEWS_BY_DAY[bKey][day].total+=delta;
      VIEWS_BY_DAY[bKey][day].byInf[user]=(VIEWS_BY_DAY[bKey][day].byInf[user]||0)+delta;

      // by inf
      if(!VIEWS_BY_INF[bKey][user]) VIEWS_BY_INF[bKey][user]={totalViews:0,totalLikes:0,totalShares:0,byDay:{},peakDay:'',peakDelta:0};
      const inf=VIEWS_BY_INF[bKey][user];
      // 누적 조회수: 최대 views 값 (누적)
      if(views>inf.totalViews) inf.totalViews=views;
      if(likes>inf.totalLikes) inf.totalLikes=likes;
      if(shares>inf.totalShares) inf.totalShares=shares;
      inf.byDay[day]=delta;
      if(delta>inf.peakDelta){ inf.peakDelta=delta; inf.peakDay=day; }
    }

    // 날짜 범위 초기화
    if(!inited && SALES_RAW.length){
      const max=SALES_RAW[SALES_RAW.length-1].day;
      const d=new Date(max); d.setDate(d.getDate()-90);
      const from=d.toISOString().slice(0,10), min=SALES_RAW[0].day;
      ['foodology','fully','epais'].forEach(b=>{
        dateRange[b]={from:'2025-12-01',to:max};
        activeInf[b]=new Set([...Object.keys(VIEWS_BY_INF[b]||{}), ...Object.keys(SEED_META[b]||{})]);
      });
      inited=true;
    }

    document.getElementById('data-range-sub').textContent=
      `매출 ${SALES_RAW[0].day}~${SALES_RAW[SALES_RAW.length-1].day}`;

    renderPanel(current);
    const now=new Date().toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    st.textContent=`✓ ${now} 동기화 완료`; st.style.color='#4af7a0';

    // 디버그: 시딩비용 집계 확인 (브라우저 콘솔 F12)
    console.log('[SEED_ROWS] 총 행수:', SEED_ROWS.length);
    console.log('[SEED_ROWS] 샘플 (첫 5개):', SEED_ROWS.slice(0,5));
    const costByBrandMonth={};
    for(const r of SEED_ROWS){
      const raw=String(r.upload_date||'');
      const m=raw.match(/(\d{4})[\.\-\/\s]+(\d{1,2})/);
      const ym=m?`${m[1]}-${m[2].padStart(2,'0')}`:'PARSE_FAIL';
      const k=`${r.brand}|${ym}`;
      costByBrandMonth[k]=(costByBrandMonth[k]||0)+r.cost;
    }
    console.log('[월별 시딩비용 집계]', costByBrandMonth);

  }catch(e){
    st.textContent=`✗ ${e.message}`; st.style.color='#f76ac8'; console.error(e);
  }finally{
    document.getElementById('loading').classList.add('hidden');
    if(btn) btn.disabled=false;
  }
}

  const monthly={};

// ─── MONTHLY CHART ────────────────────────────────────────────
function getMonthlyData(bkey){
  const ch=activeCh[bkey];
  const {from,to}=dateRange[bkey];
  const monthly={};
  for(const r of SALES_RAW){
    // 날짜 필터 적용 (2025-12-01 이후만)
    if(from && r.day<from) continue;
    if(to   && r.day>to)   continue;
    const ym=r.day.slice(0,7);
    if(!monthly[ym]) monthly[ym]={shopify:0,amazon:0,tiktok:0,b2b:0,olive:0,total:0};
    const m=monthly[ym];
    m.shopify+=r[bkey].shopify;
    m.amazon +=r[bkey].amazon;
    m.tiktok +=r[bkey].tiktok;
    m.b2b    +=r[bkey].b2b;
    m.olive  +=(r[bkey].olive||0);
    m.total  +=(ch.has('shopify')?r[bkey].shopify:0)+(ch.has('amazon')?r[bkey].amazon:0)
              +(ch.has('tiktok')?r[bkey].tiktok:0)+(ch.has('b2b')?r[bkey].b2b:0)
              +(ch.has('olive')?(r[bkey].olive||0):0);
  }
  return Object.entries(monthly).sort((a,b)=>a[0].localeCompare(b[0]));
}

function drawMonthlyChart(bkey){
  // canvas 관련 구 코드 정리
  if(charts['cm_monthly_'+bkey]){charts['cm_monthly_'+bkey].destroy();delete charts['cm_monthly_'+bkey];}

  const wrap=document.getElementById('monthly_table_wrap_'+bkey);
  if(!wrap) return;
  const ch=activeCh[bkey];
  const entries=getMonthlyData(bkey);
  if(!entries.length){
    wrap.innerHTML=`<p style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);padding:16px;">데이터 없음</p>`;
    return;
  }

  const color=BCOLORS[bkey];
  const totals=entries.map(([,d])=>d.total);

  // 활성 채널만 (순서: Amazon, TikTok, B2B, Oliveyoung, Shopify)
  const allChDefs=[
    {key:'amazon', label:'Amazon',     c:'#f59e0b'},
    {key:'tiktok', label:'TikTok',     c:'#69c9d0'},
    {key:'b2b',    label:'B2B',        c:'#a78bfa'},
    {key:'olive',  label:'Oliveyoung', c:'#4ade80'},
    {key:'shopify',label:'Shopify',    c:'#96bf48'},
  ].filter(d=>ch.has(d.key) && entries.some(([,r])=>(r[d.key]||0)>0));

  const thBase = `font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:9px 14px;border-bottom:1px solid var(--border);`;
  let thead=`<tr>
    <th style="${thBase}text-align:left;color:var(--muted);">월</th>`;
  for(const d of allChDefs)
    thead+=`<th style="${thBase}text-align:right;color:${d.c};">${d.label}</th>`;
  thead+=`<th style="${thBase}text-align:right;color:var(--muted2);">합계</th>
    <th style="${thBase}text-align:right;color:var(--muted2);">MOM</th>
  </tr>`;

  let tbody='';
  entries.forEach(([ym,d],i)=>{
    const total=totals[i];
    const prev=i>0?totals[i-1]:null;
    const mom=(prev&&prev>0)?((total-prev)/prev*100):null;
    const momStr=mom===null?'—':`${mom>=0?'+':''}${mom.toFixed(1)}%`;
    const momColor=mom===null?'var(--muted)':mom>=0?'#4af7a0':'#f76ac8';
    const yr=ym.slice(0,4), mo=parseInt(ym.slice(5));
    const label=`${yr}년 ${mo}월`;

    const tdBase=`font-family:'DM Mono',monospace;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04);text-align:right;`;
    tbody+=`<tr onmouseover="this.style.background='rgba(255,255,255,.03)'" onmouseout="this.style.background=''">`;
    tbody+=`<td style="${tdBase}text-align:left;font-size:11px;color:var(--muted2);white-space:nowrap;">${label}</td>`;

    for(const def of allChDefs){
      const val=d[def.key]||0;
      const pct=total>0?(val/total*100):0;
      tbody+=`<td style="${tdBase}font-size:11px;">
        <span style="color:var(--text);font-weight:500;">₩${fmtKRW(val)}</span>
        <span style="display:block;font-size:8px;color:var(--muted);margin-top:1px;">${val>0?pct.toFixed(0)+'%':''}</span>
      </td>`;
    }

    // 합계 컬럼
    tbody+=`<td style="${tdBase}font-size:13px;font-weight:700;color:${color};">₩${fmtKRW(total)}</td>`;
    // MOM 컬럼
    tbody+=`<td style="${tdBase}font-size:12px;font-weight:600;color:${momColor};">${momStr}</td>`;
    tbody+='</tr>';
  });

  wrap.innerHTML=`
    <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:auto;">
      <table style="width:100%;border-collapse:collapse;min-width:500px;">
        <thead style="background:rgba(255,255,255,.025);">${thead}</thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>`;
}


// ─── KPIs ─────────────────────────────────────────────────────
function drawKPIs(bkey, f){
  const color=BCOLORS[bkey];
  const {from,to}=dateRange[bkey];
  let total=0, totalViews=0;
  const ch=activeCh[bkey];
  for(const r of f){
    total+=(ch.has('shopify')?r[bkey].shopify:0)+(ch.has('amazon')?r[bkey].amazon:0)+(ch.has('tiktok')?r[bkey].tiktok:0)+(ch.has('olive')?(r[bkey].olive||0):0);
  }
  for(const [d,v] of Object.entries(VIEWS_BY_DAY[bkey]||{})){
    if((!from||d>=from)&&(!to||d<=to)) totalViews+=v.total;
  }
  let peakDay='',peakVal=0;
  for(const r of f){
    const v=(ch.has('shopify')?r[bkey].shopify:0)+(ch.has('amazon')?r[bkey].amazon:0)+(ch.has('tiktok')?r[bkey].tiktok:0)+(ch.has('olive')?(r[bkey].olive||0):0);
    if(v>peakVal){peakVal=v;peakDay=r.day;}
  }
  // 채널별 금액 계산
  let amzTotal=0,ttkTotal=0,b2bTotal=0,oliveTotal=0,shopTotal=0;
  for(const r of f){
    amzTotal  +=(ch.has('amazon')  ?r[bkey].amazon:0);
    ttkTotal  +=(ch.has('tiktok')  ?r[bkey].tiktok:0);
    b2bTotal  +=(ch.has('b2b')     ?r[bkey].b2b:0);
    oliveTotal+=(ch.has('olive')   ?(r[bkey].olive||0):0);
    shopTotal +=(ch.has('shopify') ?r[bkey].shopify:0);
  }
  const chRow=[
    {label:'Amazon',     val:amzTotal,   c:'#f59e0b'},
    {label:'TikTok Shop',val:ttkTotal,   c:'#69c9d0'},
    {label:'B2B',        val:b2bTotal,   c:'#a78bfa'},
    {label:'Oliveyoung', val:oliveTotal, c:'#4ade80'},
    {label:'Shopify',    val:shopTotal,  c:'#96bf48'},
  ].filter(d=>d.val>0);
  const chBarsHTML=chRow.map(d=>{
    const pct=total>0?(d.val/total*100):0;
    return `<div style="margin-bottom:6px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;">
        <span style="font-family:'DM Mono',monospace;font-size:9px;color:${d.c};letter-spacing:.06em;text-transform:uppercase;">${d.label}</span>
        <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text);font-weight:500;">₩${fmtKRW(d.val)}</span>
      </div>
      <div style="height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;">
        <div style="height:100%;width:${pct.toFixed(1)}%;background:${d.c};border-radius:3px;transition:width .6s ease;"></div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('kpi_'+bkey).innerHTML=`
    <div class="kpi" style="--c:${color};grid-column:span 1;">
      <div class="kpi-label">총 매출 합계</div>
      <div class="kpi-val" style="color:${color};font-size:30px;margin-bottom:4px;">₩${fmtKRW(total)}</div>
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);margin-bottom:14px;">피크 ${peakDay.slice(5)} · ₩${fmtKRW(peakVal)}</div>
      ${chBarsHTML}
    </div>
    <div class="kpi" style="--c:var(--views);overflow:visible;">
      <div class="kpi-label" style="margin-bottom:8px;">📈 월별 조회수 · 시딩비용 · CPM</div>
      <div style="font-family:'DM Mono',monospace;font-size:18px;font-weight:600;color:var(--views);margin-bottom:2px;">${fmtView(totalViews)}</div>
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);margin-bottom:12px;">${Object.keys(VIEWS_BY_INF[bkey]||{}).length}명 인플루언서 · 기간 합계</div>
      ${buildMonthlyViewsTable(bkey, from, to)}
    </div>`;
}

function buildMonthlyViewsTable(bkey, from, to){
  // 월별 조회수 집계 (view_delta 합산)
  const vmap=VIEWS_BY_DAY[bkey]||{};
  const monthly={};
  for(const [day,v] of Object.entries(vmap)){
    if(from && day<from) continue;
    if(to   && day>to)   continue;
    const ym=day.slice(0,7);
    monthly[ym]=(monthly[ym]||0)+v.total;
  }

  // 월별 시딩 비용 (SEED_ROWS 기반 — 행별 upload_date·cost 직접 집계, 인플루언서 무관)
  const monthlyCost={};
  for(const row of SEED_ROWS){
    if(row.brand !== bkey) continue;
    const raw = String(row.upload_date||'');
    const m = raw.match(/(\d{4})[\.\-\/\s]+(\d{1,2})[\.\-\/\s]*(\d{1,2})?/);
    if(!m) continue;
    const ym=`${m[1]}-${m[2].padStart(2,'0')}`;
    // 날짜 필터 적용 (월 단위)
    if(from && ym < from.slice(0,7)) continue;
    if(to   && ym > to.slice(0,7))   continue;
    monthlyCost[ym]=(monthlyCost[ym]||0)+row.cost;
  }

  const entries=Object.keys({...monthly,...monthlyCost}).sort();

  if(!entries.length) return '<span style="font-size:10px;color:var(--muted);">데이터 없음</span>';

  const thS=`font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:5px 8px;border-bottom:1px solid var(--border);text-align:right;`;
  let rows='';
  for(const ym of entries){
    const views=monthly[ym]||0;
    const cost=monthlyCost[ym]||0;
    const cpm=(cost&&views>0)?(cost/views*1000):null;
    const mo=parseInt(ym.slice(5));
    rows+=`<tr onmouseover="this.style.background='rgba(255,255,255,.03)'" onmouseout="this.style.background=''">
      <td style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.04);white-space:nowrap;">${mo}월</td>
      <td style="font-family:'DM Mono',monospace;font-size:10px;color:var(--views);padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.04);text-align:right;">${views>0?fmtView(views):'—'}</td>
      <td style="font-family:'DM Mono',monospace;font-size:10px;color:#a78bfa;padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.04);text-align:right;">${cost>0?'$'+cost.toLocaleString():'—'}</td>
      <td style="font-family:'DM Mono',monospace;font-size:10px;color:${cpm?'#f7a84a':'var(--muted)'};padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.04);text-align:right;">${cpm?'$'+cpm.toFixed(2):'—'}</td>
    </tr>`;
  }

  return `<div style="overflow:auto;max-height:200px;">
    <table style="width:100%;border-collapse:collapse;">
      <thead><tr>
        <th style="${thS}text-align:left;">월</th>
        <th style="${thS}">조회수</th>
        <th style="${thS}color:#a78bfa;">시딩비용</th>
        <th style="${thS}color:#f7a84a;">CPM</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// ─── MAIN CHART: 매출 라인 + 조회수 막대 ────────────────────
function drawMainChart(bkey, f){
  if(charts['cm_'+bkey]){charts['cm_'+bkey].destroy();delete charts['cm_'+bkey];}
  const ctx=document.getElementById('cm_'+bkey)?.getContext('2d'); if(!ctx) return;
  const color=BCOLORS[bkey];
  const {from,to}=dateRange[bkey];

  // 날짜 축 합집합
  const daySet=new Set(f.map(r=>r.day));
  Object.keys(VIEWS_BY_DAY[bkey]||{}).forEach(d=>{if((!from||d>=from)&&(!to||d<=to))daySet.add(d);});
  const labels=[...daySet].sort();
  const salesMap={}; for(const r of f) salesMap[r.day]=r;
  const vmap=VIEWS_BY_DAY[bkey]||{};

  // 활성 인플루언서 필터 적용한 조회수
  const viewData=labels.map(d=>{
    if(!vmap[d]) return 0;
    const byInf=vmap[d].byInf;
    return Object.entries(byInf).reduce((s,[u,v])=>s+(activeInf[bkey].has(u)?v:0),0);
  });

  const datasets=[
    // 조회수 막대 (뒤에 그려지도록 order 높음)
    {
      label:'일별 조회수 (View Δ)',
      data: viewData,
      type:'bar',
      backgroundColor: hex2rgba('#7c9cff',.55),
      borderColor: 'transparent',
      borderWidth:0,
      yAxisID:'yViews',
      order:2,
    },
    // 매출 라인
    {
      label:`${BLABELS[bkey]} 총 매출`,
      data: labels.map(d=>{
        const r=salesMap[d]; if(!r) return 0;
        const ch2=activeCh[bkey];
        return (ch2.has('shopify')?r[bkey].shopify:0)+(ch2.has('amazon')?r[bkey].amazon:0)+(ch2.has('tiktok')?r[bkey].tiktok:0)+(ch2.has('olive')?(r[bkey].olive||0):0);
      }),
      type:'line',
      borderColor: color,
      backgroundColor: hex2rgba(color,.08),
      borderWidth:2.5,
      fill:true,
      tension:.35,
      pointRadius: labels.length>90?0:3,
      pointBackgroundColor: color,
      yAxisID:'ySales',
      order:1,
    },
  ];

  charts['cm_'+bkey]=new Chart(ctx,{
    type:'bar',
    data:{labels,datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{labels:{color:'rgba(228,228,240,.5)',font:{family:'DM Mono',size:10},boxWidth:10}},
        tooltip:{
          backgroundColor:'rgba(14,14,24,.97)',
          borderColor:'rgba(255,255,255,.12)',
          borderWidth:1,
          titleColor:'rgba(228,228,240,.9)',
          bodyColor:'#e4e4f0',
          titleFont:{family:'DM Mono',size:11, weight:'700'},
          bodyFont:{family:'DM Mono',size:10},
          padding:14,
          displayColors: false,
          callbacks:{
            title: items => {
              const day=labels[items[0]?.dataIndex];
              return day ? day : (items[0]?.label||'');
            },
            label: () => null,  // body는 afterBody에서 직접 처리
            afterBody: items =>{
              const idx=items[0]?.dataIndex;
              if(idx===undefined) return [];
              const day=labels[idx];
              const r=salesMap[day];
              const ch2=activeCh[bkey];
              const lines=[];

              // ── 채널별 매출 ──
              if(r){
                const chData=[
                  {label:'Amazon',     val:ch2.has('amazon')  ?r[bkey].amazon:0,   c:'🟡'},
                  {label:'TikTok Shop',val:ch2.has('tiktok')  ?r[bkey].tiktok:0,   c:'🩵'},
                  {label:'B2B',        val:0, c:'🟣'},
                  {label:'Oliveyoung', val:ch2.has('olive')   ?(r[bkey].olive||0):0,c:'🟢'},
                  {label:'Shopify',    val:ch2.has('shopify') ?r[bkey].shopify:0,   c:'🟩'},
                ].filter(d=>d.val>0);

                const dayTotal=chData.reduce((s,d)=>s+d.val,0);

                lines.push('─── 매출 ────────────────');
                for(const d of chData){
                  const pct=dayTotal>0?(d.val/dayTotal*100):0;
                  const bar='█'.repeat(Math.round(pct/10))+'░'.repeat(10-Math.round(pct/10));
                  lines.push(`${d.c} ${d.label.padEnd(11)} ₩${fmtKRW(d.val).padStart(7)} ${pct.toFixed(0).padStart(3)}%`);
                }
                lines.push(`   합계          ₩${fmtKRW(dayTotal).padStart(7)}`);
              } else {
                lines.push('  (매출 데이터 없음)');
              }

              // ── 조회수 ──
              const barItem=items.find(i=>i.dataset.yAxisID==='yViews');
              if(barItem && barItem.raw>0){
                lines.push('');
                lines.push('─── 조회수 (View Δ) ─────');
                const v=vmap[day];
                if(v){
                  lines.push(`  합계: ${fmtView(barItem.raw)}`);
                  const sorted=Object.entries(v.byInf)
                    .filter(([u])=>activeInf[bkey].has(u))
                    .sort((a,b)=>b[1]-a[1]);
                  for(const [u,val] of sorted.slice(0,5)) lines.push(`  @${u}: ${fmtView(val)}`);
                  if(sorted.length>5) lines.push(`  ... 외 ${sorted.length-5}명`);
                }
              }
              return lines;
            }
          }
        }
      },
      scales:{
        x:{
          ticks:{color:'rgba(228,228,240,.22)',font:{family:'DM Mono',size:9},maxTicksLimit:12,maxRotation:0},
          grid:{color:'rgba(255,255,255,.03)'}
        },
        ySales:{
          type:'linear',position:'left',
          ticks:{color:hex2rgba(BCOLORS[bkey],.55),font:{family:'DM Mono',size:9},callback:v=>'₩'+fmtKRW(v)},
          grid:{color:'rgba(255,255,255,.03)'},
          title:{display:true,text:'매출',color:hex2rgba(BCOLORS[bkey],.4),font:{family:'DM Mono',size:9}}
        },
        yViews:{
          type:'linear',position:'right',
          ticks:{color:'rgba(124,156,255,.5)',font:{family:'DM Mono',size:9},callback:v=>fmtView(v)},
          grid:{drawOnChartArea:false},
          title:{display:true,text:'조회수 (Δ)',color:'rgba(124,156,255,.4)',font:{family:'DM Mono',size:9}}
        }
      }
    }
  });
}

// ─── INF CARDS ────────────────────────────────────────────────
function drawInfCards(bkey){
  const grid=document.getElementById('inf-grid-'+bkey); if(!grid) return;
  const infData=VIEWS_BY_INF[bkey]||{};
  const seedMeta=SEED_META[bkey]||{};
  const {from,to}=dateRange[bkey];

  // 조회수 있는 인플루언서 + seed에만 있는 인플루언서 모두 포함
  const allUsers = new Set([...Object.keys(infData), ...Object.keys(seedMeta)]);
  const infList=[...allUsers].map(user=>{
    const d=infData[user]||{totalViews:0,totalLikes:0,totalShares:0,byDay:{},peakDay:'',peakDelta:0};
    let filteredViews=0;
    for(const [day,delta] of Object.entries(d.byDay)){
      if((!from||day>=from)&&(!to||day<=to)) filteredViews+=delta;
    }
    return {user, ...d, filteredViews};
  }).sort((a,b)=>b.filteredViews-a.filteredViews);

  // 뱃지 업데이트
  const badge=document.getElementById('inf-badge-'+bkey);
  if(badge) badge.textContent=`${infList.length}명 전체`;

  grid.innerHTML=infList.map((inf,i)=>{
    const isActive=activeInf[bkey].has(inf.user);
    const meta=seedMeta[inf.user]||{};
    const rank=i+1;
    const rankClass=rank===1?'gold':rank===2?'silver':rank===3?'bronze':'';
    const tierKey=(meta.tier||'').toLowerCase();
    const tierClass=tierKey.includes('mega')?'tier-mega':tierKey.includes('macro')?'tier-macro':
      tierKey.includes('middle')||tierKey.includes('mid')?'tier-middle':
      tierKey.includes('micro')?'tier-micro':'tier-nano';

    const ttLink=meta.tt_url?`<a class="link-btn link-tt" href="${meta.tt_url}" target="_blank" onclick="event.stopPropagation()">🎵 TikTok</a>`:'';
    const igLink=meta.ig_url?`<a class="link-btn link-ig" href="${meta.ig_url}" target="_blank" onclick="event.stopPropagation()">📷 Instagram</a>`:'';
    const hasLinks=ttLink||igLink;

    const uploadStr=meta.upload_date?`<span class="inf-date-item">업로드 <span>${meta.upload_date.replace(/\.\s*/g,'.').trim()}</span></span>`:'';
    const peakStr=inf.peakDay?`<span class="inf-date-item">🔥 피크 <span>${inf.peakDay.slice(5)} · ${fmtView(inf.peakDelta)}</span></span>`:'';
    const costStr=meta.cost?`<span class="meta-kv">시딩비용 <span>$${meta.cost.toLocaleString()}</span></span>`:'';
    const follStr=meta.follower?`<span class="meta-kv">팔로워 <span>${meta.follower}</span></span>`:'';
    // CPM = 시딩비용 ÷ 누적 조회수(오늘까지) × 1000
    const cpm = (meta.cost && inf.totalViews > 0) ? (meta.cost / inf.totalViews * 1000) : null;
    const cpmStr = cpm !== null
      ? `<span class="meta-kv" title="CPM = $${meta.cost} ÷ ${fmtView(inf.totalViews)} (누적) × 1000">CPM <span>$${cpm.toFixed(2)}</span></span>`
      : (meta.cost ? `<span class="meta-kv" title="조회수 데이터 없음">CPM <span style="color:var(--muted)">N/A</span></span>` : '');

    return `
    <div class="inf-card${isActive?'':' inactive'}" onclick="toggleInf('${bkey}','${inf.user}',this)">
      <div class="inf-card-header">
        <div class="inf-name-row">
          <div class="rank-badge ${rankClass}">${rank}</div>
          <span class="inf-username" onclick="copyHandle('${inf.user}', event)" title="클릭하여 복사">@${inf.user}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="inf-total-views">${fmtView(inf.filteredViews)}</span>
          <span class="${isActive?'on-pill':'off-pill'}">${isActive?'ON':'OFF'}</span>
        </div>
      </div>

      ${(meta.tier||meta.follower||meta.cost)?`
      <div class="inf-meta-row">
        ${meta.tier?`<span class="tier-badge ${tierClass}">${meta.tier}</span>`:''}
        ${meta.tier&&(meta.follower||meta.cost)?'<div class="meta-sep"></div>':''}
        ${follStr}
        ${meta.follower&&meta.cost?'<div class="meta-sep"></div>':''}
        ${costStr}
        ${(meta.cost&&cpmStr)?'<div class="meta-sep"></div>':''}
        ${cpmStr}
      </div>`:''}

      <div class="inf-stats">
        <div class="stat-item">
          <span class="stat-val" style="color:var(--views)">${fmtView(inf.totalViews)}</span>
          <span class="stat-lbl">누적 조회수</span>
        </div>
        <div class="stat-sep"></div>
        <div class="stat-item">
          <span class="stat-val" style="color:#ff7aaa">${fmtView(inf.totalLikes)}</span>
          <span class="stat-lbl">총 LIKES</span>
        </div>
        <div class="stat-sep"></div>
        <div class="stat-item">
          <span class="stat-val" style="color:#6be8a0">${fmtView(inf.totalShares)}</span>
          <span class="stat-lbl">총 SHARES</span>
        </div>
      </div>

      <div class="inf-chart-wrap">
        <canvas id="ic_${bkey}_${inf.user.replace(/\./g,'_')}"></canvas>
      </div>

      <div class="inf-footer">
        ${(uploadStr||peakStr)?`<div class="inf-dates">${uploadStr}${peakStr}</div>`:''}
        ${hasLinks?`<div class="inf-links">${ttLink}${igLink}</div>`:''}
      </div>
    </div>`;
  }).join('');

  // 인플루언서 소형 차트 그리기
  setTimeout(()=>{
    infList.forEach(inf=>{
      const id=`ic_${bkey}_${inf.user.replace(/\./g,'_')}`;
      const ctx=document.getElementById(id)?.getContext('2d'); if(!ctx) return;
      const {from,to}=dateRange[bkey];
      const days=Object.keys(inf.byDay).filter(d=>(!from||d>=from)&&(!to||d<=to)).sort();
      const data=days.map(d=>inf.byDay[d]||0);
      if(charts[id]) charts[id].destroy();
      charts[id]=new Chart(ctx,{
        type:'line',
        data:{
          labels:days.map(d=>d.slice(5)),
          datasets:[{
            data,
            borderColor:'rgba(124,156,255,.7)',
            backgroundColor:'rgba(124,156,255,.08)',
            borderWidth:1.5,
            fill:true,
            tension:.4,
            pointRadius:data.length>30?0:2,
            pointBackgroundColor:'#7c9cff',
          }]
        },
        options:{
          responsive:true, maintainAspectRatio:false,
          plugins:{legend:{display:false},tooltip:{
            backgroundColor:'#14141f',borderColor:'rgba(255,255,255,.1)',borderWidth:1,
            titleColor:'rgba(228,228,240,.5)',bodyColor:'#e4e4f0',
            titleFont:{family:'DM Mono',size:9},bodyFont:{family:'DM Mono',size:9},
            callbacks:{label:c=>` ${fmtView(c.raw)}`}
          }},
          scales:{
            x:{display:true,ticks:{color:'rgba(228,228,240,.2)',font:{family:'DM Mono',size:8},maxTicksLimit:5,maxRotation:0},grid:{display:false}},
            y:{display:false}
          }
        }
      });
    });
  },50);
}

// ─── INTERACTIONS ─────────────────────────────────────────────
function copyHandle(user, event){
  event.stopPropagation();
  navigator.clipboard.writeText('@'+user).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value='@'+user; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  });
  const toast=document.getElementById('copy-toast');
  toast.textContent='@'+user+' 복사됨';
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), 1800);
}

function toggleInf(bkey, user, card){
  const s=activeInf[bkey];
  if(s.has(user)) s.delete(user); else s.add(user);
  card.classList.toggle('inactive',!s.has(user));
  const pill=card.querySelector('.on-pill,.off-pill');
  if(pill){ pill.className=s.has(user)?'on-pill':'off-pill'; pill.textContent=s.has(user)?'ON':'OFF'; }
  // 차트만 업데이트 (카드 재렌더 없이)
  const f=getFiltered(bkey);
  drawMainChart(bkey, f);
  drawKPIs(bkey, f);
}

function toggleCh(bkey, ch, btn){
  const s=activeCh[bkey];
  if(s.has(ch) && s.size===1) return; // 최소 1개 유지
  if(s.has(ch)){ s.delete(ch); btn.className='chtab'; }
  else          { s.add(ch);   btn.className=`chtab on-${ch}`; }
  const f=getFiltered(bkey);
  drawKPIs(bkey, f);
  drawMonthlyChart(bkey);
  // 서랍 초기 열림
  setTimeout(()=>{
    const el=document.getElementById('monthly_'+bkey);
    if(el && !el.dataset.initialized){
      el.style.maxHeight=el.scrollHeight+'px';
      el.dataset.initialized='1';
    }
  }, 50);
  drawMainChart(bkey, f);
}

function bulkToggle(bkey, on){
  if(on) Object.keys(VIEWS_BY_INF[bkey]||{}).forEach(u=>activeInf[bkey].add(u));
  else   activeInf[bkey].clear();
  renderPanel(bkey);
}

function toggleSection(id){
  const el=document.getElementById(id);
  const arrow=document.getElementById('arrow_'+id);
  if(!el) return;
  const isOpen=el.style.maxHeight!=='0px'&&el.style.maxHeight!=='';
  if(isOpen){
    el.style.maxHeight='0px';
    if(arrow) arrow.style.transform='rotate(180deg)';
  } else {
    el.style.maxHeight=el.scrollHeight+'px';
    if(arrow) arrow.style.transform='rotate(0deg)';
  }
}

const MIN_DATE='2025-12-01';
function setPreset(bkey,p,btn){
  const max=SALES_RAW[SALES_RAW.length-1]?.day||new Date().toISOString().slice(0,10);
  const d=new Date(max);
  let from;
  if(p==='all'){ from=MIN_DATE; }
  else{
    if(p==='30d') d.setDate(d.getDate()-30);
    else if(p==='90d') d.setDate(d.getDate()-90);
    else if(p==='6m') d.setMonth(d.getMonth()-6);
    from=d.toISOString().slice(0,10);
    if(from<MIN_DATE) from=MIN_DATE; // MIN_DATE 이전은 제한
  }
  dateRange[bkey]={from,to:max};
  document.getElementById('from_'+bkey).value=from;
  document.getElementById('to_'+bkey).value=max;
  document.querySelectorAll(`#pset_${bkey} .preset-btn`).forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  drawAll(bkey);
}

function onDateChange(bkey){
  let from=document.getElementById('from_'+bkey).value;
  let to=document.getElementById('to_'+bkey).value;
  if(from && from<MIN_DATE){ from=MIN_DATE; document.getElementById('from_'+bkey).value=MIN_DATE; }
  dateRange[bkey].from=from;
  dateRange[bkey].to  =to;
  document.querySelectorAll(`#pset_${bkey} .preset-btn`).forEach(b=>b.classList.remove('active'));
  drawAll(bkey);
}

function onScheduleChange(sel){
  const v=sel.value;
  if(_sTimer){clearInterval(_sTimer);_sTimer=null;}
  if(_dTimer){clearTimeout(_dTimer);_dTimer=null;}
  if(v==='0') return;
  if(v==='daily_1pm'){
    const sched=()=>{
      const now=new Date(),next=new Date(now);
      next.setHours(13,0,0,0); if(next<=now) next.setDate(next.getDate()+1);
      document.getElementById('sync-status').textContent=`다음 동기화: ${next.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}`;
      _dTimer=setTimeout(()=>{doSync();sched();},next-now);
    }; sched();
  } else { _sTimer=setInterval(doSync,parseInt(v,10)); }
}

doSync();
